<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kitaplar - Kütüphane Yönetim Sistemi</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h2>Kütüphane</h2>
        <a href="/dashboard">Ana Panel</a>
        <a href="/books" class="active">Kitaplar</a>
        <a href="/members">Üyeler</a>
        <a href="/loans">Ödünç İşlemleri</a>
        <a href="/logout">Çıkış Yap</a>
    </aside>

    <main class="content">
        <h1 class="page-title">Kitap Yönetimi</h1>

        <div class="card">
            <h2>Yeni Kitap Ekle</h2>

            <form action="/books/add" method="POST" class="form-grid book-form">
                <div class="form-group">
                    <label>Kitap Adı</label>
                    <input type="text" name="title" required>
                </div>

                <div class="form-group">
                    <label>Yazar</label>
                    <input type="text" name="author" required>
                </div>

                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" name="isbn">
                </div>

                <div class="form-group">
                    <label>Adet</label>
                    <input type="number" name="quantity" min="1" value="1" required>
                </div>

                <button type="submit">Kitap Ekle</button>
            </form>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Kitap Adı</th>
                    <th>Yazar</th>
                    <th>ISBN</th>
                    <th>Adet</th>
                    <th>İşlem</th>
                </tr>
            </thead>

            <tbody>
                {{range .}}
                <tr>
                    <td>{{.ID}}</td>
                    <td>{{.Title}}</td>
                    <td>{{.Author}}</td>
                    <td>{{.ISBN}}</td>
                    <td>
    {{if gt .Quantity 0}}
        <span class="badge badge-success">{{.Quantity}} adet</span>
    {{else}}
        <span class="badge badge-danger">Stok Yok</span>
    {{end}}
</td>
                    <td>
                       <a class="btn btn-danger" 
   href="/books/delete?id={{.ID}}"
   onclick="return confirm('Bu kitabı silmek istediğinize emin misiniz?')">
   Sil
</a>
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="6">Henüz kitap eklenmemiş.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </main>
</div>

</body>
</html>
